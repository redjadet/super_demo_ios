# SwiftLint — superDemoApp (SwiftUI, SwiftData, Swift Concurrency)
# Run: ./bin/lint.sh  |  Autocorrect: ./bin/format.sh

swiftlint_version: 0.63.2

included:
  - superDemoApp
  - superDemoAppTests
  - superDemoAppUITests

excluded:
  - DerivedData
  - .build
  - "**/*.generated.swift"

analyzer_rules:
  - capture_variable
  - typesafe_array_init
  - unused_declaration
  - unused_import

opt_in_rules:
  - array_init
  - attributes
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - comma_inheritance
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - discouraged_optional_boolean
  - empty_count
  - empty_string
  - explicit_init
  - extension_access_modifier
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - joined_default_parameter
  - last_where
  - legacy_random
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - operator_usage_whitespace
  - optional_enum_case_matching
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - private_swiftui_state
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_imports
  - static_operator
  - strong_iboutlet
  - toggle_bool
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - yoda_condition

disabled_rules:
  - blanket_disable_command
  - file_length
  - trailing_comma
  - function_body_length
  - function_parameter_count
  - nesting
  - todo
  - type_body_length

line_length:
  warning: 120
  error: 150
  ignores_urls: true
  ignores_function_declarations: true
  ignores_interpolated_strings: true

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60
  excluded:
    # Xcode template names — rename to UpperCamelCase in a dedicated refactor.
    - superDemoAppApp
    - superDemoAppTests
    - superDemoAppUITests
    - superDemoAppUITestsLaunchTests

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - x
    - y
    - i
    - os

cyclomatic_complexity:
  warning: 12
  error: 20

large_tuple:
  warning: 3
  error: 4

reporter: xcode

custom_rules:
  no_navigation_view:
    name: Prefer NavigationStack
    regex: '\bNavigationView\s*\('
    message: "Use NavigationStack (or NavigationSplitView on macOS) instead of deprecated NavigationView."
    severity: warning

  no_print_debug:
    name: No print() in app code
    regex: '\bprint\s*\('
    message: "Use os.Logger or debug-only logging; avoid print() in committed code."
    severity: warning

  no_force_try:
    name: No force try
    regex: 'try!'
    message: "Handle errors explicitly; avoid try!."
    severity: error

  swiftdata_model_final:
    name: SwiftData @Model must be final class
    regex: '@Model\s*\n\s*(?:public\s+|internal\s+|fileprivate\s+|private\s+)?class\s+(?!final)'
    message: "@Model types should be declared as final class."
    severity: warning
