# SwiftLint — superDemoApp (SwiftUI, SwiftData, Swift Concurrency)
# Run: ./bin/lint.sh  |  Autocorrect: ./bin/format.sh

swiftlint_version: 0.63.2

included:
  - superDemoApp
  - superDemoAppTests
  - superDemoAppUITests

excluded:
  - DerivedData
  - .build
  - "**/*.generated.swift"

analyzer_rules:
  - capture_variable
  - typesafe_array_init
  - unused_declaration
  - unused_import

opt_in_rules:
  - accessibility_label_for_image
  - accessibility_trait_for_button
  - array_init
  - async_without_await
  - attributes
  - balanced_xctest_lifecycle
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - comma_inheritance
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - discarded_notification_center_observer
  - discouraged_assert
  - discouraged_optional_boolean
  - discouraged_optional_collection
  - empty_count
  - empty_string
  - empty_xctest_method
  - explicit_init
  - extension_access_modifier
  - final_test_case
  - flatmap_over_map_reduce
  - function_default_parameter_at_end
  - fatal_error_message
  - first_where
  - force_unwrapping
  - identical_operands
  - implicitly_unwrapped_optional
  - incompatible_concurrency_annotation
  - joined_default_parameter
  - last_where
  - legacy_objc_type
  - legacy_random
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - operator_usage_whitespace
  - optional_enum_case_matching
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_key_path
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_swiftui_state
  - prohibited_interface_builder
  - quick_discouraged_focused_test
  - quick_discouraged_pending_test
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - shorthand_optional_binding
  - sorted_first_last
  - static_operator
  - strong_iboutlet
  - test_case_accessibility
  - toggle_bool
  - trailing_closure
  - unavailable_function
  - unhandled_throwing_task
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - yoda_condition

disabled_rules:
  - blanket_disable_command
  - file_length
  - trailing_comma
  - function_body_length
  - function_parameter_count
  - nesting
  - todo
  - type_body_length

line_length:
  warning: 120
  error: 150
  ignores_urls: true
  ignores_function_declarations: true
  ignores_interpolated_strings: true

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60
  excluded:
    # Xcode template names — rename to UpperCamelCase in a dedicated refactor.
    - superDemoAppApp
    - superDemoAppTests
    - superDemoAppUITests
    - superDemoAppUITestsLaunchTests

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - x
    - y
    - i
    - os

cyclomatic_complexity:
  warning: 12
  error: 20

large_tuple:
  warning: 3
  error: 4

reporter: xcode

custom_rules:
  no_navigation_view:
    name: Prefer NavigationStack
    regex: '\bNavigationView\s*\('
    message: "Use NavigationStack (or NavigationSplitView on macOS) instead of deprecated NavigationView."
    severity: warning

  no_print_debug:
    name: No print() in app code
    regex: '\bprint\s*\('
    message: "Use os.Logger or debug-only logging; avoid print() in committed code."
    severity: warning

  no_force_try:
    name: No force try
    regex: 'try!'
    message: "Handle errors explicitly; avoid try!."
    severity: error

  swiftdata_model_final:
    name: SwiftData @Model must be final class
    regex: '@Model\s*\n\s*(?:public\s+|internal\s+|fileprivate\s+|private\s+)?class\s+(?!final)'
    message: "@Model types should be declared as final class."
    severity: warning

  no_task_detached:
    name: Avoid Task.detached
    regex: '\bTask\s*\.\s*detached\b'
    message: "Avoid Task.detached in app code; use structured tasks, injected services, or an actor-owned task."
    severity: warning

  no_dispatch_main_async:
    name: Prefer MainActor over DispatchQueue.main.async
    regex: '\bDispatchQueue\s*\.\s*main\s*\.\s*async\b'
    message: "Use @MainActor or MainActor.run instead of DispatchQueue.main.async in Swift concurrency code."
    severity: warning

  no_screen_bounds_layout:
    name: No screen-bounds layout
    regex: '\b(?:UIScreen|NSScreen)\s*\.\s*main\b|\bUIScreen\s*\.\s*main\s*\.\s*bounds\b'
    message: "Avoid screen-size layout; use SwiftUI adaptive containers, geometry, and size classes."
    severity: warning

  no_uiapplication_shared:
    name: Avoid UIApplication.shared in universal code
    regex: '\bUIApplication\s*\.\s*shared\b'
    message: "Avoid UIApplication.shared in universal app code; use scene, environment, or platform-specific adapters."
    severity: warning
