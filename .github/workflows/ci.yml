name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build-test:
    runs-on: macos-15
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          if XCODE_APP="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"; then
            :
          elif [[ -d /Applications/Xcode.app ]]; then
            XCODE_APP="/Applications/Xcode.app"
          else
            echo "error: no Xcode.app found under /Applications" >&2
            ls /Applications
            exit 1
          fi
          echo "Using ${XCODE_APP}"
          sudo xcode-select -s "${XCODE_APP}/Contents/Developer"
          xcodebuild -version

      - name: Install lint tools
        run: brew bundle --file Brewfile

      - name: Prepare iOS Simulator
        env:
          CI: true
        run: ./tool/ensure_ci_simulator.sh

      - name: CI (lint, test, iPad/Mac builds)
        env:
          CI: true
        run: ./bin/ci.sh
