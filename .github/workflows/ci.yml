name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build-test:
    runs-on: macos-15
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install lint tools
        run: brew bundle --file Brewfile

      - name: Lint
        env:
          CI: true
        run: ./bin/lint.sh

      - name: Lint Markdown
        run: ./bin/lint-markdown.sh

      - name: Build
        run: |
          xcodebuild \
            -project superDemoApp.xcodeproj \
            -scheme superDemoApp \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            build

      - name: Test
        run: |
          xcodebuild \
            -project superDemoApp.xcodeproj \
            -scheme superDemoApp \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            test
